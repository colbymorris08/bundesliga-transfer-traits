<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bundesliga Transfer Traits — Player Explorer</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,"Times New Roman",serif;background:#f4f5f7;color:#1c1c1c;line-height:1.45}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 20px 48px}
  header{margin-bottom:16px;border-bottom:2px solid #1c1c1c;padding-bottom:12px}
  h1{font-size:24px}
  .sub{font-family:system-ui,sans-serif;font-size:13px;color:#444;margin-top:6px;max-width:820px}
  .banner{font-family:system-ui,sans-serif;font-size:13px;background:#eef3f8;border:1px solid #c5d0de;
    border-radius:6px;padding:10px 12px;margin:14px 0}
  .controls{font-family:system-ui,sans-serif;display:flex;flex-wrap:wrap;gap:12px;align-items:end;
    background:#fff;border:1px solid #d0d4db;border-radius:6px;padding:12px 14px;margin-bottom:16px}
  label{display:flex;flex-direction:column;gap:4px;font-size:11px;font-weight:600;text-transform:uppercase;color:#555}
  select{font:14px system-ui,sans-serif;padding:7px 10px;min-width:200px;border:1px solid #b8bec8;border-radius:4px}
  .layout{display:grid;grid-template-columns:1.05fr .95fr;gap:16px}
  @media(max-width:900px){.layout{grid-template-columns:1fr}}
  .panel{background:#fff;border:1px solid #d0d4db;border-radius:6px;padding:14px}
  .player-title{font-size:22px;font-weight:700}
  .player-sub{font-family:system-ui,sans-serif;font-size:13px;color:#444;margin-top:4px}
  .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
  .kpi{background:#f7f8fa;border:1px solid #e2e5eb;border-radius:4px;padding:8px;text-align:center}
  .kpi .v{font-family:system-ui,sans-serif;font-size:20px;font-weight:700}
  .kpi .l{font-family:system-ui,sans-serif;font-size:10px;color:#666;text-transform:uppercase}
  .chart-label{font-family:system-ui,sans-serif;font-size:11px;text-align:center;color:#666;margin-bottom:4px}
  #pizza{width:100%;max-width:480px;display:block;margin:0 auto}
  .wedge{cursor:pointer}.wedge:hover,.wedge.active{filter:brightness(1.12)}
  .legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-family:system-ui,sans-serif;font-size:11px;font-weight:600;margin-top:8px}
  .dot{display:inline-block;width:10px;height:10px;margin-right:4px;vertical-align:middle;background:#3d5a80}
  .dot.pr{background:#bc4749}.dot.a{width:14px;height:0;border-top:2px dashed #1c1c1c}.dot.t{width:14px;height:0;border-top:2px solid #888}
  .metric-list{max-height:520px;overflow:auto;border:1px solid #e2e5eb;border-radius:4px}
  .metric-hdr,.metric-row{display:grid;grid-template-columns:12px 1fr 40px 36px 36px 36px;gap:4px;align-items:center;
    padding:6px 8px;font-family:system-ui,sans-serif;font-size:11px}
  .metric-hdr{background:#1c1c1c;color:#fff;font-size:10px;font-weight:700;position:sticky;top:0}
  .metric-row{border-bottom:1px solid #ececec;cursor:pointer}
  .metric-row:hover,.metric-row.active{background:#eef3f8}
  .pass{color:#1b7a45;font-weight:700;font-size:9px}
  #explainer{display:none;position:fixed;z-index:50;max-width:280px;background:#1c1c1c;color:#fff;border-radius:6px;
    padding:10px 12px;font-family:system-ui,sans-serif;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.25);pointer-events:none}
  #explainer .t{color:#ffd166;font-weight:700;margin-bottom:4px}
  footer{margin-top:16px;font-family:system-ui,sans-serif;font-size:11px;color:#777}
</style>
</head>

  <footer id="page-footer"></footer>
</div>

let DATA = SOURCES.statsbomb;
document.getElementById('banner').textContent = (DATA.pizza_note||'') + ' ' + (DATA.step2_instruction||'');
const INTL_COMPS = ['FIFA World Cup','UEFA Euro','African Cup of Nations','Copa America'];
const srcSel = document.getElementById('data-source');
const leagueSel=document.getElementById('league-filter');
const teamSel=document.getElementById('team-filter');

const leagueBox=document.getElementById('league-summary');
let players = [];

function updateSourceChrome(){
  const live = DATA.source_status === 'live';
  const n = DATA.cohort_n != null ? DATA.cohort_n : (DATA.cohort_n_target ? 'target ≥'+DATA.cohort_n_target : '—');
  const pass = DATA.n_metrics_passed_0_40 != null ? `${DATA.n_metrics_passed_0_40}/${DATA.n_metrics_tested} pass r≥${DATA.stability_threshold}` : 'pipeline planned';
  const red = DATA.n_redundancy_pairs != null ? `${DATA.n_redundancy_pairs} redundancy pair(s)` : 'redundancy TBD';
  document.getElementById('page-sub').innerHTML =
    (live
      ? `<strong>${DATA.source_label}</strong> · cohort N=${n} · ${pass} · ${red} · <strong>dotted navy = Avg Bundesliga peer</strong>. For FIFA World Cup / Euro priors, choose <strong>National team</strong> after Source league.`
      : `<strong>${DATA.source_label}</strong> · same stability → redundancy → pizza pipeline at Tier 1 scale (N≥${DATA.cohort_n_target||500}). No FBref player seasons loaded yet — use StatsBomb for the live deep dive.`);
  document.getElementById('page-footer').textContent = live
    ? 'Data: StatsBomb Open Data · World Cup / Euro → use National team filter (club league may not be in open data)'
    : 'Data: FBref / Sports Reference (planned) · StatsBomb remains the live open-data deep dive until FBref cohort freeze';
  document.getElementById('banner').textContent = (DATA.pizza_note||'') + ' ' + (DATA.step2_instruction||'');
}

function loadSource(id){
  DATA = SOURCES[id] || SOURCES.statsbomb;
  players = (DATA.players||[]).slice().sort((a,b)=>{
    if(a.position!==b.position) return a.position.localeCompare(b.position);
    return (b.score||0)-(a.score||0);
  });
  players.forEach(p=>{ p.primary_source = (p.sources && p.sources[0]) ? p.sources[0] : 'Unknown'; });
  updateSourceChrome();
  leagueSel.innerHTML='';
  ['All leagues',...[...new Set(players.map(p=>p.primary_source))].sort()].forEach(L=>{
    const o=document.createElement('option'); o.value=L; o.textContent=L; leagueSel.appendChild(o);
  });
  posSel.innerHTML='';
  ['All positions',...[...new Set(players.map(p=>p.position))].sort()].forEach(p=>{
    const o=document.createElement('option'); o.value=p; o.textContent=p; posSel.appendChild(o);
  });
  fillPlayers();
}

function syncTeamFilter(){
  const league=leagueSel.value;
  const isIntl = INTL_COMPS.includes(league);
  teamWrap.style.display = isIntl ? '' : 'none';
  const prev = teamSel.value;
  const teams = ['All teams', ...[...new Set(
    players.filter(p=>p.primary_source===league).map(p=>p.national_team).filter(Boolean)
  )].sort()];
  teamSel.innerHTML='';
  teams.forEach(t=>{ const o=document.createElement('option'); o.value=t; o.textContent=t; teamSel.appendChild(o); });
  if(teams.includes(prev)) teamSel.value=prev; else teamSel.value='All teams';
}

function filtered(){
  const league=leagueSel.value, team=teamSel.value, pos=posSel.value;
  return players.filter(p =>
    (league==='All leagues' || p.primary_source===league) &&
    (!INTL_COMPS.includes(league) || team==='All teams' || p.national_team===team) &&
    (pos==='All positions' || p.position===pos)
  );
}

function updateLeagueSummary(){
  const league=leagueSel.value;
  if(league==='All leagues'){ leagueBox.style.display='none'; return; }
  const list=filtered();
  const scores=list.map(p=>p.score).filter(x=>x!=null);
  const mean=scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : '—';
  const teamBit = (INTL_COMPS.includes(league) && teamSel.value!=='All teams') ? ` · team <strong>${teamSel.value}</strong>` : '';
  const tip = INTL_COMPS.includes(league)
    ? ' <em>(tournament prior — club league often not in open data; use National team)</em>' : '';
  leagueBox.style.display='block';
  leagueBox.innerHTML=`<strong>${league}</strong>${teamBit} — ${list.length} player(s) · mean score ${mean}${tip}`;
}

function fillPlayers(){
  syncTeamFilter();
  updateLeagueSummary();
  const list=filtered(); plySel.innerHTML='';
  const by={}; list.forEach(p=>{(by[p.position]||=[]).push(p)});
  Object.keys(by).sort().forEach(pos=>{
    const og=document.createElement('optgroup'); og.label=pos;
    by[pos].forEach(p=>{
      const o=document.createElement('option'); o.value=p.id;
      const team = p.national_team ? ` · ${p.national_team}` : '';
      o.textContent=`${p.name}${team} · score ${p.score??'—'} (${p.arrival})`;
      og.appendChild(o);
    });
    plySel.appendChild(og);
  });
  if(list.length) selectPlayer(list[0].id);
  else {
    const planned = DATA.source_status === 'planned';
    document.getElementById('pname').textContent = planned ? 'FBref cohort not loaded' : 'No players';
    document.getElementById('psub').textContent = planned
      ? 'Target N≥500 inbound seasons · switch Data source to StatsBomb for live pizzas'
      : 'Try another league / team / position';
    document.getElementById('k-des').textContent='—';
    document.getElementById('k-prior').textContent='—';
    document.getElementById('k-y1').textContent='—';
    document.getElementById('pizza').innerHTML='';
    document.getElementById('metric-rows').innerHTML='';
  }
}

function getPlayer(id){return players.find(p=>String(p.id)===String(id))}
function selectPlayer(id){
  const p=getPlayer(id); if(!p) return; plySel.value=p.id;
  const team = p.national_team ? ` · ${p.national_team}` : '';
  document.getElementById('pname').textContent=p.name;
  document.getElementById('psub').textContent=`${p.position}${team} · ${p.arrival} · prior: ${(p.sources||[]).join(', ')||'n/a'}`;
  document.getElementById('k-des').textContent = p.score!=null ? Number(p.score).toFixed(1) : '—';
  document.getElementById('k-prior').textContent = p.prior_minutes!=null ? Math.round(p.prior_minutes) : '—';
  document.getElementById('k-y1').textContent = p.y1_minutes!=null ? Math.round(p.y1_minutes) : '—';
  renderPizza(p); renderTable(p);
}

function renderPizza(p){
  const mets=(p.metrics||[]).slice(); window._mets=mets;
  const svg=document.getElementById('pizza'); svg.innerHTML='';
  const n=mets.length||1, cx=260,cy=260,rMax=188,rInner=38,rTab=rMax+16,gap=0.005;
  function wedgePath(i,val,r0,r1){
    const a0=-Math.PI/2+i*(2*Math.PI/n)+gap, a1=-Math.PI/2+(i+1)*(2*Math.PI/n)-gap;
    const rr0=r0, rr1=r0+(r1-r0)*Math.max(0,Math.min(1,(val||0)/100));
    const x0=cx+rr0*Math.cos(a0), y0=cy+rr0*Math.sin(a0);
    const x1=cx+rr1*Math.cos(a0), y1=cy+rr1*Math.sin(a0);
    const x2=cx+rr1*Math.cos(a1), y2=cy+rr1*Math.sin(a1);
    const x3=cx+rr0*Math.cos(a1), y3=cy+rr0*Math.sin(a1);
    const large= (a1-a0)>Math.PI ? 1 : 0;
    return `M${x0},${y0} L${x1},${y1} A${rr1},${rr1} 0 ${large} 1 ${x2},${y2} L${x3},${y3} A${rr0},${rr0} 0 ${large} 0 ${x0},${y0} Z`;
  }
  function ring(i,val,stroke,dash,w){
    const a0=-Math.PI/2+i*(2*Math.PI/n)+gap, a1=-Math.PI/2+(i+1)*(2*Math.PI/n)-gap;
    const rr=rInner+(rMax-rInner)*Math.max(0,Math.min(1,(val||0)/100));
    const x0=cx+rr*Math.cos(a0), y0=cy+rr*Math.sin(a0);
    const x1=cx+rr*Math.cos(a1), y1=cy+rr*Math.sin(a1);
    const large=(a1-a0)>Math.PI?1:0;
    const pth=document.createElementNS('http://www.w3.org/2000/svg','path');
    pth.setAttribute('d',`M${x0},${y0} A${rr},${rr} 0 ${large} 1 ${x1},${y1}`);
    pth.setAttribute('fill','none'); pth.setAttribute('stroke',stroke);
    pth.setAttribute('stroke-width',w||2); if(dash) pth.setAttribute('stroke-dasharray',dash);
    svg.appendChild(pth);
  }
  const colors=['#3d5a80','#4a6fa5','#2f9e79','#bc4749','#e09f3e','#6a4c93','#577590','#43aa8b','#f9844a','#277da1','#90be6d'];
  mets.forEach((m,i)=>{
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',wedgePath(i,m.player,rInner,rMax));
    path.setAttribute('fill',colors[i%colors.length]); path.setAttribute('opacity','0.85');
    path.classList.add('wedge'); path.dataset.i=i;
    path.addEventListener('click',e=>{showExplain(p,i,e); highlight(i)});
    svg.appendChild(path);
    ring(i,m.avg,'#1c1c1c','4 3',1.5);
    ring(i,m.top,'#888',null,1.5);
    if(m.prior!=null) ring(i,m.prior,'#bc4749','3 2',1.4);
    const mid=-Math.PI/2+(i+0.5)*(2*Math.PI/n);
    const tx=cx+rTab*Math.cos(mid), ty=cy+rTab*Math.sin(mid);
    const lab=document.createElementNS('http://www.w3.org/2000/svg','text');
    lab.setAttribute('x',tx); lab.setAttribute('y',ty); lab.setAttribute('text-anchor','middle');
    lab.setAttribute('dominant-baseline','middle'); lab.setAttribute('font-size','10');
    lab.setAttribute('font-family','system-ui,sans-serif'); lab.setAttribute('font-weight','700');
    lab.textContent=m.abbrev||m.key; lab.classList.add('slice-tab');
    lab.addEventListener('click',e=>{showExplain(p,i,e); highlight(i)});
    svg.appendChild(lab);
  });
  const core=document.createElementNS('http://www.w3.org/2000/svg','circle');
  core.setAttribute('cx',cx); core.setAttribute('cy',cy); core.setAttribute('r',rInner-2);
  core.setAttribute('fill','#fff'); core.setAttribute('stroke','#d0d4db');
  svg.appendChild(core);
}
function renderTable(p){
  const mets=(p.metrics||[]).slice(); window._mets=mets;
  document.getElementById('metric-rows').innerHTML = mets.map((m,i)=>`
    <div class="metric-row" data-i="${i}">
      <span>${m.passes_threshold?'<span class="pass">PASS</span>':''}</span>
      <span>${m.label||m.key}${m.passes_threshold?' <span class="pass">PASS</span>':''}</span>
      <span>${m.prior??'—'}</span><span><strong>${m.player??'—'}</strong></span><span>${m.avg}</span><span>${m.top}</span>
    </div>`).join('');
  document.querySelectorAll('.metric-row').forEach(el=>{
    el.addEventListener('click',e=>{showExplain(p,+el.dataset.i,e); highlight(+el.dataset.i)});
  });
}
function highlight(i){
  document.querySelectorAll('.wedge').forEach((el,j)=>el.classList.toggle('active',j===i));
  document.querySelectorAll('.metric-row').forEach((el,j)=>el.classList.toggle('active',j===i));
}
function showExplain(p,i,evt){
  const m=(window._mets&&window._mets[i])||p.metrics[i]; if(!m) return;
  const ex=document.getElementById('explainer'); ex.style.display='block';
  ex.querySelector('.t').textContent=`${m.abbrev} · ${m.key}`;
  ex.querySelector('.b').textContent=m.hint||'';
  ex.querySelector('.s').textContent=`Pre ${m.prior??'—'} → Y1 ${m.player??'—'} · Avg ${m.avg} · Top ${m.top}`;
  if(evt){ex.style.left=Math.min(evt.clientX+12,innerWidth-300)+'px'; ex.style.top=Math.min(evt.clientY+12,innerHeight-120)+'px'}
}

srcSel.onchange=()=>loadSource(srcSel.value);
leagueSel.onchange=()=>{ syncTeamFilter(); fillPlayers(); };
teamSel.onchange=fillPlayers;
posSel.onchange=fillPlayers;
